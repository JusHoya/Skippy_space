# Langfuse self-hosted OTLP backend — Phase 1 target (PRD §9.3).
#
# This stub is intentionally minimal. Phase 0 does NOT require Langfuse to be
# running; the renderer reads OTel spans directly off the Tauri Channel until
# the persistence layer comes online. Bring this up only when you start
# exercising the OTLP exporter in `packages/otel`.
#
# Bring up:  docker compose --profile langfuse -f infra/langfuse/docker-compose.yml up -d
# Tear down: docker compose -f infra/langfuse/docker-compose.yml down
#
# Web UI:     http://localhost:3000
# OTLP HTTP:  http://localhost:4318/v1/traces  (point the collector here)
#
# Version note: we pin Langfuse v2 deliberately. Langfuse v3 requires a
# ClickHouse sidecar plus Redis — heavyweight for a hobby box. PRD §9.3 says
# v2 + Postgres handles ~5M spans/day, which is plenty for a single-user
# orchestrator. When/if we upgrade to v3, the CLICKHOUSE_* env stubs below
# are pre-wired (commented out) as a migration anchor.

services:
  langfuse-db:
    # Pinned to 16.4 for reproducibility — bump deliberately, not implicitly.
    image: postgres:16.4-alpine
    restart: unless-stopped
    profiles: ['langfuse']
    environment:
      # All three values are placeholders for local dev; rotate via .env
      # before exposing this beyond localhost.
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U langfuse -d langfuse']
      interval: 10s
      timeout: 5s
      retries: 10

  langfuse-server:
    # langfuse/langfuse:2 = current LTS-ish v2 line. See header comment for
    # why we are not on v3 yet.
    image: langfuse/langfuse:2
    restart: unless-stopped
    profiles: ['langfuse']
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - '3000:3000'      # web UI
      - '4318:4318'      # OTLP HTTP ingest (gen_ai semconv)
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      # CHANGEME — placeholders for local dev. Override via .env before
      # exposing this anywhere beyond localhost; both values must be
      # high-entropy (32+ chars) in any non-toy deployment.
      NEXTAUTH_SECRET: changeme-phase1
      SALT: changeme-phase1
      TELEMETRY_ENABLED: 'false'
      # ---- Langfuse v3 prerequisites (commented out — see header). ----
      # CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      # CLICKHOUSE_USER: default
      # CLICKHOUSE_PASSWORD: clickhouse
      # CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      # REDIS_HOST: langfuse-redis
      # REDIS_PORT: '6379'

volumes:
  langfuse-pgdata:
